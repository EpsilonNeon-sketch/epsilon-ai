<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Email Refiner | AI-Powered</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --accent-green: #10b981;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: var(--surface-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-primary);
        }

        .brand svg {
            width: 24px;
            height: 24px;
            color: var(--primary-color);
        }

        /* Main Layout */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 350px 1fr;
            overflow: hidden;
        }

        /* Sidebar / Controls */
        aside {
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .control-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Inputs */
        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            min-height: 120px;
        }

        /* Tone Selection Pills */
        .tone-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tone-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .tone-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .tone-btn.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        /* Action Button */
        .generate-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .generate-btn:hover {
            background-color: var(--primary-hover);
        }

        .generate-btn:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Content Area (Split Pane) */
        .content-area {
            display: grid;
            grid-template-rows: 1fr 1fr;
            background-color: #f1f5f9;
            padding: 1.5rem;
            gap: 1.5rem;
            overflow: hidden;
        }

        .pane {
            background-color: var(--surface-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .pane-header {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafbfc;
        }

        .pane-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pane-content {
            flex: 1;
            padding: 1.25rem;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .pane-content.placeholder-text {
            color: #94a3b8;
            font-style: italic;
        }

        /* Output Specifics */
        .output-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-color);
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .copy-feedback {
            position: fixed;
            top: 5rem;
            right: 2rem;
            background-color: var(--text-primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .copy-feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loading State */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 5;
            display: none; /* Hidden by default */
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                overflow-y: auto;
            }
            
            .content-area {
                height: 600px;
                overflow-y: auto;
            }

            aside {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                max-height: 400px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="brand">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
            </svg>
            <span>ExecRefiner AI</span>
        </div>
    </header>

    <!-- Main Application -->
    <main>
        <!-- Sidebar Controls -->
        <aside>
            <div class="control-group">
                <label class="control-label">Sender & Recipient Details</label>
                <input type="text" id="senderName" placeholder="Your Name">
                <input type="text" id="recipientName" placeholder="Recipient Name">
                <input type="text" id="companyName" placeholder="Company Name (Optional)">
            </div>

            <div class="control-group">
                <label class="control-label">Select Tone</label>
                <div class="tone-grid" id="toneContainer">
                    <button class="tone-btn active" data-tone="professional">Professional</button>
                    <button class="tone-btn" data-tone="assertive">Assertive Exec</button>
                    <button class="tone-btn" data-tone="diplomatic">Diplomatic & Warm</button>
                    <button class="tone-btn" data-tone="concise">Concise & Direct</button>
                    <button class="tone-btn" data-tone="apologetic">Apologetic</button>
                </div>
            </div>

            <div class="control-group" style="flex: 1;">
                <label class="control-label">Rough Draft / Raw Thoughts</label>
                <textarea id="rawInput" placeholder="e.g., 'Hey, the project is late again. I need it by Friday or else. Also tell John to check the logs.'"></textarea>
            </div>

            <button id="generateBtn" class="generate-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
                </svg>
                Refine Email
            </button>
        </aside>

        <!-- Content Area -->
        <div class="content-area">
            
            <!-- Original Draft Pane -->
            <div class="pane">
                <div class="pane-header">
                    <div class="pane-title">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                        Original Draft
                    </div>
                </div>
                <div id="originalPane" class="pane-content placeholder-text">
                    Your rough draft will appear here as you type...
                </div>
            </div>

            <!-- Refined Output Pane -->
            <div class="pane" style="position: relative;">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <span style="font-weight: 500; color: var(--text-secondary);">Polishing tone & structure...</span>
                </div>
                <div class="pane-header">
                    <div class="pane-title" style="color: var(--primary-color);">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Refined Result
                    </div>
                    <div class="output-actions">
                        <button class="icon-btn" id="copyBtn" title="Copy to Clipboard">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
                <div id="refinedPane" class="pane-content placeholder-text">
                    The AI-refined email will appear here after processing...
                </div>
            </div>

        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20" style="color: #4ade80;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Copied to clipboard!</span>
    </div>

    <script>
        // State
        let currentTone = 'professional';

        // DOM Elements
        const rawInput = document.getElementById('rawInput');
        const originalPane = document.getElementById('originalPane');
        const refinedPane = document.getElementById('refinedPane');
        const generateBtn = document.getElementById('generateBtn');
        const toneBtns = document.querySelectorAll('.tone-btn');
        const copyBtn = document.getElementById('copyBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toast = document.getElementById('toast');
        
        const senderNameInput = document.getElementById('senderName');
        const recipientNameInput = document.getElementById('recipientName');
        const companyNameInput = document.getElementById('companyName');

        // Event Listeners

        // 1. Tone Selection
        toneBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                toneBtns.forEach(b => b.classList.remove('active'));
                // Add active class to clicked
                btn.classList.add('active');
                // Update state
                currentTone = btn.dataset.tone;
            });
        });

        // 2. Real-time update of Original Pane
        rawInput.addEventListener('input', () => {
            const text = rawInput.value.trim();
            if (text) {
                originalPane.textContent = text;
                originalPane.classList.remove('placeholder-text');
            } else {
                originalPane.textContent = "Your rough draft will appear here as you type...";
                originalPane.classList.add('placeholder-text');
            }
        });

        // 3. Generate Email Logic
        generateBtn.addEventListener('click', async () => {
            const rawText = rawInput.value.trim();
            if (!rawText) {
                showToast("Please enter a rough draft first.", true);
                return;
            }

            // Show Loading
            loadingOverlay.style.display = 'flex';
            generateBtn.disabled = true;
            generateBtn.textContent = 'Processing...';

            // Construct Prompt
            const sender = senderNameInput.value.trim() || '[My Name]';
            const recipient = recipientNameInput.value.trim() || '[Recipient Name]';
            const company = companyNameInput.value.trim() || '[Company]';

            const systemPrompt = `You are a professional executive assistant. Your task is to rewrite raw, messy email drafts into polished, professional emails.
            
            Context:
            - Sender Name: ${sender}
            - Recipient Name: ${recipient}
            - Company: ${company}
            
            Desired Tone: ${currentTone}.
            
            Tone Guidelines:
            - Professional: Standard corporate etiquette, clear, polite, structured.
            - Assertive Exec: Direct, commanding, confident, focuses on results and deadlines, less fluff.
            - Diplomatic & Warm: Empathetic, relationship-building, softens bad news but remains clear, uses polite closing.
            - Concise & Direct: Bullet points if necessary, short sentences, strictly factual, no filler words.
            - Apologetic: Sincere, takes responsibility, offers reassurance or solution, respectful tone.
            
            Instructions:
            1. If placeholders like "[Name]" or "[Date]" are implied in the raw text, use the provided names where appropriate.
            2. Ensure proper email structure (Salutation, Body, Closing, Sign-off).
            3. Output ONLY the final email text. Do not include explanations like "Here is the rewritten version:"`;

            try {
                // Fetch from text.pollinations.ai
                // We use encodeURIComponent to safely pass the prompt
                const promptText = `${systemPrompt}\n\nRaw Draft:\n${rawText}`;
                const url = `https://text.pollinations.ai/${encodeURIComponent(promptText)}`;
                
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.text();
                
                // Update UI
                refinedPane.textContent = data;
                refinedPane.classList.remove('placeholder-text');

            } catch (error) {
                console.error('Error:', error);
                refinedPane.textContent = "Error generating email. Please try again.";
                refinedPane.classList.remove('placeholder-text');
                showToast("Failed to connect to AI service.", true);
            } finally {
                // Hide Loading
                loadingOverlay.style.display = 'none';
                generateBtn.disabled = false;
                generateBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
                    </svg>
                    Refine Email
                `;
            }
        });

        // 4. Copy to Clipboard
        copyBtn.addEventListener('click', () => {
            const textToCopy = refinedPane.textContent;
            if (!textToCopy || refinedPane.classList.contains('placeholder-text')) {
                showToast("Nothing to copy yet.", true);
                return;
            }

            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast("Copied to clipboard!");
            }).catch(err => {
                showToast("Failed to copy.", true);
                console.error('Could not copy text: ', err);
            });
        });

        // Helper: Toast Notification
        function showToast(message, isError = false) {
            const toastSpan = toast.querySelector('span');
            const toastIcon = toast.querySelector('svg');
            
            toastSpan.textContent = message;
            
            if (isError) {
                toastIcon.style.color = '#f87171'; // Red
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />';
            } else {
                toastIcon.style.color = '#4ade80'; // Green
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
            }

            toast.classList.add('show');

            // Hide after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
