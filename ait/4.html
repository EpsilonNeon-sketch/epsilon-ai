<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon Code Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="icon" href="https://epsilonhub.vercel.app/epsilon%20logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image:
                radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(0, 0, 0, 1) 0px, transparent 100%);
        }

        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 197, 94, 0.1);
        }

        .message-user {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-bottom-right-radius: 4px;
        }

        .message-ai {
            background: rgba(31, 31, 31, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: #22c55e;
            border-radius: 50%;
            animation: typing 1s infinite ease-in-out;
        }

        @keyframes typing {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .code-block {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 0.75rem;
            margin: 0.5rem 0;
            overflow: hidden;
        }

        .code-header {
            background: rgba(34, 197, 94, 0.1);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #86efac;
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
        }

        .code-content {
            overflow-x: auto;
            padding: 1rem;
        }

        .code-content pre {
            margin: 0;
        }

        .copy-btn {
            padding: 0.25rem 0.5rem;
            background: rgba(34, 197, 94, 0.2);
            hover: rgba(34, 197, 94, 0.3);
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 0.375rem;
            color: #86efac;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .copy-btn:hover {
            background: rgba(34, 197, 94, 0.3);
            border-color: rgba(34, 197, 94, 0.6);
        }

        .copy-response-btn {
            padding: 0.375rem 0.75rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 0.5rem;
            color: #86efac;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .copy-response-btn:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }

        .speech-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 0.5rem;
            color: #86efac;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .speech-btn:hover {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(34, 197, 94, 0.2));
            border-color: rgba(34, 197, 94, 0.6);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .speech-btn.speaking {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .image-message {
            margin: 1rem 0;
        }

        .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .image-controls {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-container:hover .image-controls {
            opacity: 1;
        }

        .image-btn {
            padding: 0.375rem 0.75rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 0.375rem;
            color: #86efac;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.3s ease;
        }

        .image-btn:hover {
            background: rgba(0, 0, 0, 0.95);
            border-color: #86efac;
        }

        input,
        textarea,
        select {
            background: rgba(15, 15, 15, 0.9) !important;
            border: 1px solid rgba(34, 197, 94, 0.2) !important;
            color: #fff !important;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: rgba(34, 197, 94, 0.6) !important;
            outline: none !important;
            ring: 2px solid rgba(34, 197, 94, 0.2) !important;
        }

        button {
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22c55e 0%, #14b8a6 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>

    <!-- Mobile Menu -->
    <div id="mobileNav" class="fixed top-0 left-0 w-64 h-screen glass z-40 hidden md:flex flex-col">
        <button id="mobileMenuCloseBtn" class="p-4 text-green-400 text-2xl">×</button>
        <div id="chatsList" class="flex-1 overflow-y-auto scrollbar-hide"></div>
        <button id="newChatBtn"
            class="w-full p-4 text-left bg-green-600/20 hover:bg-green-600/30 transition-all text-green-400 font-semibold border-t border-green-500/20">
            <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i> New Chat
        </button>
    </div>

    <!-- Main Container -->
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="hidden md:flex w-64 flex-col glass border-r border-green-500/20">
            <div class="p-6 border-b border-green-500/20">
                <h1 class="text-2xl font-bold text-green-400 flex items-center gap-2">
                    <i data-lucide="code" class="w-6 h-6"></i> Code Agent
                </h1>
            </div>

            <div id="chatsList" class="flex-1 overflow-y-auto scrollbar-hide"></div>

            <button id="newChatBtn"
                class="m-4 p-4 bg-green-600/20 hover:bg-green-600/30 transition-all text-green-400 font-semibold rounded-lg border border-green-500/30 flex items-center justify-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> New Chat
            </button>
        </div>

        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col">
            <!-- Header -->
            <div class="glass border-b border-green-500/20 p-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="mobileMenuBtn" class="md:hidden text-green-400 text-2xl">☰</button>
                    <h2 id="currentChatTitle" class="text-xl font-semibold text-green-400">New Chat</h2>
                </div>
                <button id="settingsBtn" class="p-2 hover:bg-green-600/20 rounded-lg transition-all text-green-400">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer" class="flex-1 overflow-y-auto scrollbar-hide p-6 space-y-6">
                <div id="welcomeState" class="h-full flex flex-col items-center justify-center text-center">
                    <i data-lucide="code" class="w-16 h-16 text-green-400/30 mb-4"></i>
                    <h2 class="text-3xl font-bold text-green-400 mb-2">Code Agent</h2>
                    <p class="text-gray-400 mb-6 max-w-md">Your AI assistant for web development, app development, and
                        coding in multiple languages. Ask anything about code!</p>
                </div>
            </div>

            <!-- Input Area -->
            <div id="inputArea" class="glass border-t border-green-500/20 p-6">
                <form id="chatForm" class="flex gap-3">
                    <textarea id="userInput" rows="1" placeholder="Ask about web, app, or any code..."
                        class="flex-1 bg-black/50 border border-green-500/20 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500/40 transition-all resize-none"></textarea>
                    <button type="submit"
                        class="btn-primary px-6 py-3 rounded-lg font-semibold flex items-center gap-2">
                        <span>Send</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="glass rounded-2xl w-full max-w-md p-6 space-y-6">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-green-400">Code Agent Settings</h3>
                <button id="closeSettingsBtn" class="text-gray-400 hover:text-white text-2xl">×</button>
            </div>

            <div>
                <label class="block text-sm font-semibold text-green-400 mb-2">Specialization</label>
                <select id="specialization" class="w-full p-2 rounded-lg">
                    <option value="general">General Purpose</option>
                    <option value="web">Web Development</option>
                    <option value="app">App Development</option>
                    <option value="backend">Backend/API</option>
                    <option value="devops">DevOps/Infrastructure</option>
                    <option value="database">Database Design</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-green-400 mb-2">Preferred Language</label>
                <select id="language" class="w-full p-2 rounded-lg">
                    <option value="all">All Languages</option>
                    <option value="javascript">JavaScript/TypeScript</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="csharp">C#/.NET</option>
                    <option value="cpp">C++</option>
                    <option value="rust">Rust</option>
                    <option value="go">Go</option>
                    <option value="php">PHP</option>
                    <option value="ruby">Ruby</option>
                </select>
            </div>

            <div class="flex gap-3">
                <button id="saveSettingsBtn" class="flex-1 btn-primary py-2 rounded-lg font-semibold">Save</button>
                <button id="resetSettingsBtn"
                    class="flex-1 bg-gray-600/20 hover:bg-gray-600/30 text-gray-400 py-2 rounded-lg font-semibold">Reset</button>
            </div>
        </div>
    </div>

    <!-- Code Copy Modal -->
    <div id="codeCopyModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="glass rounded-2xl w-full max-w-2xl p-6 space-y-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-green-400">Copy Code</h3>
                <button id="closeCodeModalBtn" class="text-gray-400 hover:text-white text-2xl">×</button>
            </div>

            <textarea id="codeTextarea"
                class="w-full bg-black/50 border border-green-500/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500/40 transition-all h-64 resize-none font-mono text-sm"
                readonly></textarea>

            <div class="flex gap-3">
                <button id="selectAllCodeBtn"
                    class="flex-1 bg-gray-600/20 hover:bg-gray-600/30 text-gray-400 font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                    <i data-lucide="copy" class="w-4 h-4"></i> Select All
                </button>
                <button id="closeCodeModalBtnFooter"
                    class="flex-1 btn-primary font-semibold py-3 rounded-xl">Done</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Configuration
        const SYSTEM_PROMPTS = {
            general: `You are Epsilon Code Agent, an expert AI programming assistant created to help developers with coding challenges. You provide:
- Clear, well-structured code examples
- Best practices and design patterns
- Detailed explanations of concepts
- Performance and security considerations
- Testing strategies and debugging tips

Support all programming languages and frameworks. When writing code, always include comments for complex sections.`,

            web: `You are Epsilon Web Code Agent, specializing in web development. You excel in:
- Frontend: HTML, CSS, JavaScript, React, Vue, Angular, Svelte
- Backend: Node.js, Express, Django, Flask, Rails, Laravel
- Full-stack solutions and architecture
- Web performance optimization
- SEO and accessibility best practices

Provide modern, production-ready code with explanations.`,

            app: `You are Epsilon App Code Agent, specializing in mobile and desktop applications. Expertise includes:
- Mobile: React Native, Flutter, Swift, Kotlin
- Desktop: Electron, WPF, Qt, wxWidgets
- Cross-platform solutions
- Native optimizations
- App architecture and state management

Provide app-specific patterns and best practices.`,

            backend: `You are Epsilon Backend Code Agent, specializing in backend development and APIs. Expertise includes:
- REST and GraphQL API design
- Database optimization and design
- Authentication and authorization
- Caching strategies
- Microservices architecture
- Server deployment and scaling

Focus on scalability, security, and performance.`,

            devops: `You are Epsilon DevOps Code Agent, specializing in infrastructure and deployment. Expertise includes:
- Docker and containerization
- Kubernetes orchestration
- CI/CD pipelines
- Cloud platforms (AWS, Azure, GCP)
- Infrastructure as Code
- Monitoring and logging

Provide production-ready infrastructure solutions.`,

            database: `You are Epsilon Database Code Agent, specializing in database design and optimization. Expertise includes:
- Relational database design (SQL)
- NoSQL and document databases
- Query optimization
- Indexing strategies
- Data modeling
- Migration strategies

Provide efficient, scalable database solutions.`
        };

        let specialization = localStorage.getItem('codeSpecialization') || 'general';
        let preferredLanguage = localStorage.getItem('codeLanguage') || 'all';

        // DOM Elements
        const messagesContainer = document.getElementById('messagesContainer');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatsList = document.getElementById('chatsList');
        const newChatBtn = document.getElementById('newChatBtn');
        const currentChatTitle = document.getElementById('currentChatTitle');
        const welcomeState = document.getElementById('welcomeState');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileNav = document.getElementById('mobileNav');
        const mobileMenuCloseBtn = document.getElementById('mobileMenuCloseBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const resetSettingsBtn = document.getElementById('resetSettingsBtn');
        const specializationSelect = document.getElementById('specialization');
        const languageSelect = document.getElementById('language');
        const codeCopyModal = document.getElementById('codeCopyModal');
        const closeCodeModalBtn = document.getElementById('closeCodeModalBtn');
        const closeCodeModalBtnFooter = document.getElementById('closeCodeModalBtnFooter');
        const selectAllCodeBtn = document.getElementById('selectAllCodeBtn');
        const codeTextarea = document.getElementById('codeTextarea');

        let currentSpeech = null;

        // Initialize
        specialization = localStorage.getItem('codeSpecialization') || 'general';
        preferredLanguage = localStorage.getItem('codeLanguage') || 'all';
        specializationSelect.value = specialization;
        languageSelect.value = preferredLanguage;

        // Mobile Menu
        mobileMenuBtn.addEventListener('click', () => {
            mobileNav.classList.toggle('hidden');
        });

        mobileMenuCloseBtn.addEventListener('click', () => {
            mobileNav.classList.add('hidden');
        });

        // Settings
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.add('hidden');
            }
        });

        saveSettingsBtn.addEventListener('click', () => {
            specialization = specializationSelect.value;
            preferredLanguage = languageSelect.value;
            localStorage.setItem('codeSpecialization', specialization);
            localStorage.setItem('codeLanguage', preferredLanguage);
            settingsModal.classList.add('hidden');
            alert('Settings saved!');
        });

        resetSettingsBtn.addEventListener('click', () => {
            localStorage.removeItem('codeSpecialization');
            localStorage.removeItem('codeLanguage');
            specialization = 'general';
            preferredLanguage = 'all';
            specializationSelect.value = specialization;
            languageSelect.value = preferredLanguage;
        });

        newChatBtn.addEventListener('click', () => {
            currentChatTitle.innerText = 'New Conversation';
            messagesContainer.innerHTML = '';
            welcomeState.style.display = 'flex';
            userInput.focus();
            mobileNav.classList.add('hidden');
        });

        closeCodeModalBtn.addEventListener('click', () => {
            codeCopyModal.classList.add('hidden');
        });

        closeCodeModalBtnFooter.addEventListener('click', () => {
            codeCopyModal.classList.add('hidden');
        });

        codeCopyModal.addEventListener('click', (e) => {
            if (e.target === codeCopyModal) {
                codeCopyModal.classList.add('hidden');
            }
        });

        selectAllCodeBtn.addEventListener('click', () => {
            codeTextarea.select();
            document.execCommand('copy');
            const originalText = selectAllCodeBtn.innerHTML;
            selectAllCodeBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Copied!';
            lucide.createIcons();
            setTimeout(() => {
                selectAllCodeBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        });

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;

            const inner = document.createElement('div');

            if (role === 'user') {
                inner.className = `max-w-[85%] md:max-w-[70%] p-4 rounded-2xl message-user`;
            } else {
                inner.className = `w-full max-w-4xl`;
            }

            const icon = role === 'user' ? 'user' : 'code';
            const color = role === 'user' ? 'text-green-400' : 'text-gray-400';

            const parsedContent = role === 'ai' ? parseMarkdownContent(content) : parseMessageContent(content);

            const speechButton = role === 'ai' ? `
                <button class="speech-btn" title="Read response aloud">
                    <i data-lucide="volume-2" class="w-3 h-3"></i>
                    <span>Speak</span>
                </button>
            ` : '';

            const copyButton = role === 'ai' ? `
                <button class="copy-response-btn ml-2 px-3 py-1 text-xs bg-green-600/10 hover:bg-green-600/20 border border-green-500/30 rounded-lg text-green-400 transition-all flex items-center gap-1" data-response="${content.replace(/"/g, '&quot;')}">
                    <i data-lucide="copy" class="w-3 h-3"></i>
                    <span>Copy</span>
                </button>
            ` : '';

            inner.innerHTML = `
                <div class="flex items-center gap-2 mb-2 flex-wrap">
                    <i data-lucide="${icon}" class="w-3.5 h-3.5 ${color}"></i>
                    <span class="text-[10px] uppercase font-black tracking-widest ${color}">${role === 'user' ? 'You' : 'Agent'}</span>
                    ${speechButton}
                    ${copyButton}
                </div>
                <div class="text-sm md:text-base leading-relaxed ${role === 'user' ? 'whitespace-pre-wrap' : ''}">${parsedContent}</div>
            `;

            div.appendChild(inner);
            messagesContainer.appendChild(div);

            inner.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            inner.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', copyCode);
            });

            inner.querySelectorAll('.copy-response-btn').forEach(btn => {
                btn.addEventListener('click', copyResponse);
            });

            inner.querySelectorAll('.speech-btn').forEach(btn => {
                btn.addEventListener('click', () => speakResponse(btn, content));
            });

            messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
            lucide.createIcons();
        }

        function parseMarkdownContent(content) {
            marked.setOptions({ breaks: true, gfm: true });
            let html = marked.parse(content);

            const codeBlockRegex = /<pre><code class="language-(\w+)">([\s\S]*?)<\/code><\/pre>/g;
            const codeBlocks = [];
            let codeBlockIndex = 0;

            html = html.replace(codeBlockRegex, (match, language, code) => {
                const unescapedCode = code
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>')
                    .replace(/&quot;/g, '"')
                    .replace(/&#039;/g, "'")
                    .replace(/&amp;/g, '&');

                const placeholder = `___CODE_BLOCK_${codeBlockIndex}___`;
                codeBlocks.push({ language: language || 'text', code: unescapedCode });
                codeBlockIndex++;
                return placeholder;
            });

            codeBlocks.forEach((block, index) => {
                const placeholder = `___CODE_BLOCK_${index}___`;
                const escapedCode = block.code
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');

                const codeHTML = `
                    <div class="code-block">
                        <div class="code-header">
                            <span>${block.language}</span>
                            <button class="copy-btn" data-code="${escapedCode}">
                                <i data-lucide="copy" class="w-3 h-3 inline"></i> Copy Code
                            </button>
                        </div>
                        <div class="code-content">
                            <pre><code class="language-${block.language}">${escapedCode}</code></pre>
                        </div>
                    </div>
                `;
                html = html.replace(placeholder, codeHTML);
            });

            html = html.replace(/<h1[^>]*>(.*?)<\/h1>/g, '<h1 class="text-2xl font-bold mt-4 mb-2">$1</h1>');
            html = html.replace(/<h2[^>]*>(.*?)<\/h2>/g, '<h2 class="text-xl font-bold mt-3 mb-2">$1</h2>');
            html = html.replace(/<h3[^>]*>(.*?)<\/h3>/g, '<h3 class="text-lg font-bold mt-2 mb-1">$1</h3>');
            html = html.replace(/<p[^>]*>(.*?)<\/p>/g, '<p class="mb-3">$1</p>');
            html = html.replace(/<ul[^>]*>/g, '<ul class="list-disc list-inside mb-3 ml-4">');
            html = html.replace(/<ol[^>]*>/g, '<ol class="list-decimal list-inside mb-3 ml-4">');
            html = html.replace(/<li[^>]*>/g, '<li class="mb-1">');
            html = html.replace(/<strong[^>]*>(.*?)<\/strong>/g, '<strong class="font-bold">$1</strong>');
            html = html.replace(/<em[^>]*>(.*?)<\/em>/g, '<em class="italic">$1</em>');
            html = html.replace(/<code[^>]*>(.*?)<\/code>/g, '<code class="bg-green-600/10 px-2 py-1 rounded text-green-300 font-mono text-xs">$1</code>');
            html = html.replace(/<blockquote[^>]*>/g, '<blockquote class="border-l-4 border-green-500/30 pl-4 py-2 mb-3 text-gray-400 italic">');
            html = html.replace(/<a[^>]*href="([^"]+)"[^>]*>(.*?)<\/a>/g, '<a href="$1" class="text-green-400 hover:text-green-300 underline" target="_blank">$2</a>');

            return html;
        }

        function parseMessageContent(content) {
            let html = content;
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                const language = lang || 'text';
                const escapedCode = code.trim()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');

                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span>${language}</span>
                            <button class="copy-btn" data-code="${escapedCode}">
                                <i data-lucide="copy" class="w-3 h-3 inline"></i> Copy Code
                            </button>
                        </div>
                        <div class="code-content">
                            <pre><code class="language-${language}">${escapedCode}</code></pre>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function copyResponse(e) {
            const responseText = e.currentTarget.getAttribute('data-response');
            navigator.clipboard.writeText(responseText).then(() => {
                const originalHTML = e.currentTarget.innerHTML;
                e.currentTarget.innerHTML = '<i data-lucide="check" class="w-3 h-3"></i><span>Copied!</span>';
                lucide.createIcons();
                setTimeout(() => {
                    e.currentTarget.innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            });
        }

        function copyCode(e) {
            const code = e.currentTarget.getAttribute('data-code');
            codeTextarea.value = code;
            codeCopyModal.classList.remove('hidden');
            setTimeout(() => {
                codeTextarea.select();
            }, 100);
        }

        function speakResponse(btn, content) {
            if (currentSpeech) {
                window.speechSynthesis.cancel();
                btn.classList.remove('speaking');
                currentSpeech = null;
                return;
            }

            let plainText = content
                .replace(/\*\*(.+?)\*\*/g, '$1')
                .replace(/\*(.+?)\*/g, '$1')
                .replace(/__(.+?)__/g, '$1')
                .replace(/_(.+?)_/g, '$1')
                .replace(/`(.+?)`/g, '$1')
                .replace(/\[(.+?)\]\(.+?\)/g, '$1')
                .replace(/!\[.*?\]\(.+?\)/g, '[Image]')
                .replace(/```[\s\S]*?```/g, '[Code Block]')
                .replace(/^#+\s+/gm, '');

            const utterance = new SpeechSynthesisUtterance(plainText);
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;

            btn.classList.add('speaking');
            currentSpeech = utterance;

            utterance.onend = () => {
                btn.classList.remove('speaking');
                currentSpeech = null;
            };

            utterance.onerror = () => {
                btn.classList.remove('speaking');
                currentSpeech = null;
            };

            window.speechSynthesis.speak(utterance);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            welcomeState.style.display = 'none';
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'flex justify-start';
            typingDiv.innerHTML = '<div class="flex gap-1"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay: 0.2s"></div><div class="typing-dot" style="animation-delay: 0.4s"></div></div>';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });

            try {
                const systemPrompt = SYSTEM_PROMPTS[specialization];
                const languageInfo = preferredLanguage !== 'all' ? `\nUser's preferred language: ${preferredLanguage}` : '';

                const response = await fetch('https://text.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemPrompt + languageInfo },
                            { role: 'user', content: text }
                        ],
                        model: 'openai'
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                messagesContainer.removeChild(typingDiv);
                appendMessage('ai', aiResponse);
            } catch (error) {
                messagesContainer.removeChild(typingDiv);
                appendMessage('ai', 'Sorry, I encountered an error processing your request. Please try again.');
            }
        });

        // Auto-grow textarea
        userInput.addEventListener('input', (e) => {
            e.target.style.height = 'auto';
            e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
        });
    </script>
</body>

</html>
